<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="popup-logo">🦞</div>
      <div class="popup-header-info">
        <h1>OpenClaw</h1>
        <span class="popup-status disconnected" id="popup-status">未连接</span>
      </div>
    </header>

    <!-- Messages -->
    <div class="popup-messages" id="popup-messages">
      <div class="popup-welcome" id="popup-welcome">
        <div class="popup-welcome-icon">🦞</div>
        <p>通过此窗口向本地 OpenClaw 发送指令</p>
        <p>安全中间件保护您的敏感操作</p>
      </div>
    </div>

    <!-- Typing -->
    <div class="popup-typing hidden" id="popup-typing">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <!-- Input -->
    <div class="popup-input-area">
      <textarea id="popup-input" rows="1" placeholder="输入指令... (Enter 发送)"></textarea>
      <button id="popup-send-btn" title="发送">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <!-- Setup Overlay -->
    <div class="popup-overlay hidden" id="popup-setup-overlay">
      <div class="popup-card">
        <div class="popup-card-icon">🔐</div>
        <h3>初次使用设置</h3>
        <p>欢迎使用 OpenClaw 浏览器插件。<br>请先设置安全密码以开始使用。</p>
        <input type="password" id="popup-setup-pw" placeholder="设置密码（至少6位）" autocomplete="new-password">
        <input type="password" id="popup-setup-pw-confirm" placeholder="确认密码" autocomplete="new-password">
        <div class="popup-error" id="popup-setup-error"></div>
        <button id="popup-setup-btn">设置密码并开始使用</button>
      </div>
    </div>

    <!-- Password Overlay -->
    <div class="popup-overlay hidden" id="popup-pw-overlay">
      <div class="popup-card">
        <div class="popup-card-icon">🔒</div>
        <h3>安全验证</h3>
        <span class="popup-pw-level sensitive" id="popup-pw-level">敏感操作</span>
        <p id="popup-pw-desc">此操作需要密码确认</p>
        <div class="popup-keywords" id="popup-pw-keywords"></div>
        <input type="password" id="popup-pw-input" placeholder="输入安全密码" autocomplete="off">
        <div class="popup-error" id="popup-pw-error"></div>
        <div class="popup-card-btns">
          <button class="cancel" id="popup-pw-cancel">取消</button>
          <button class="confirm" id="popup-pw-confirm">确认发送</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../lib/storage.js"></script>
  <script src="../lib/security.js"></script>
  <script src="../lib/openclaw-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
